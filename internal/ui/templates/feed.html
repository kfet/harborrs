{{define "feed"}}{{template "base" .}}{{end}}
{{define "title"}}{{.Feed.Title}} — harborrs{{end}}
{{define "content"}}
<section class="feed">
<h1>{{.Feed.Title}}</h1>
<ul class="entries">
{{range .Entries}}{{template "entryrow" .}}{{end}}
</ul>
</section>
{{end}}

{{define "entryrow"}}
<li id="entry-{{.Hash}}" class="entry {{if .Read}}read{{end}}{{if .Starred}} starred{{end}}">
<a href="/ui/entry?id={{.Hash}}">{{.Title}}</a>
<button class="readbtn" hx-post="/ui/entry/read?id={{.Hash}}&state={{if .Read}}0{{else}}1{{end}}" hx-target="#entry-{{.Hash}}" hx-swap="outerHTML">{{if .Read}}mark unread{{else}}mark read{{end}}</button>
<button class="starbtn" hx-post="/ui/entry/star?id={{.Hash}}&state={{if .Starred}}0{{else}}1{{end}}" hx-target="#entry-{{.Hash}}" hx-swap="outerHTML">{{if .Starred}}unstar{{else}}star{{end}}</button>
</li>
{{end}}
