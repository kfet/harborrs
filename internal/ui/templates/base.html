{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{block "title" .}}harborrs{{end}}</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/ui/static/style.css">
{{if .ExtraCSS}}<link rel="stylesheet" href="{{.ExtraCSS}}">{{end}}
<script src="/ui/static/htmx.min.js"></script>
</head>
<body data-theme="{{.Theme}}">
<header>
<a href="/ui/" class="brand">harborrs</a>
{{if .User}}
<nav class="nav">
<a href="/ui/">feeds</a>
<a href="/ui/all">unread</a>
<a href="/ui/starred">starred</a>
</nav>
<form method="POST" action="/ui/logout" class="logout"><button type="submit">logout</button></form>
{{end}}
</header>
<main>{{block "content" .}}{{end}}</main>
</body>
</html>{{end}}
