name: release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: false
      - name: Build release artefacts
        run: make release-local VERSION="${GITHUB_REF_NAME#v}"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

      # ---- Homebrew tap update --------------------------------------------
      # Renders Formula/harborrs.rb from packaging/homebrew/harborrs.rb.tmpl
      # using the just-built checksums, then commits + pushes it to
      # github.com/kfet/homebrew-harborrs. Requires a repo secret
      # HOMEBREW_TAP_TOKEN — a fine-grained PAT (or app token) with
      # `contents:write` on that tap repo.
      - name: Render Homebrew formula
        run: |
          mkdir -p tap/Formula
          scripts/render-formula.sh \
            "${GITHUB_REF_NAME#v}" \
            dist/checksums.txt \
            tap/Formula/harborrs.rb
          cat tap/Formula/harborrs.rb
      - name: Push to homebrew-harborrs tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set; skipping tap update"
            exit 0
          fi
          ver="${GITHUB_REF_NAME#v}"
          tmp=$(mktemp -d)
          git clone --depth 1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/kfet/homebrew-harborrs.git" \
            "$tmp/tap"
          mkdir -p "$tmp/tap/Formula"
          cp tap/Formula/harborrs.rb "$tmp/tap/Formula/harborrs.rb"
          cd "$tmp/tap"
          git config user.name  "harborrs-release[bot]"
          git config user.email "harborrs-release@users.noreply.github.com"
          git add Formula/harborrs.rb
          if git diff --cached --quiet; then
            echo "tap already up to date"
            exit 0
          fi
          git commit -m "harborrs ${ver}"
          git push origin HEAD
