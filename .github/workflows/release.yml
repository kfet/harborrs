name: release

on:
  push:
    tags: ['v*']
  # Manual trigger for re-running a release workflow that was
  # missed (e.g. GitHub Actions outage while a tag was pushed).
  # Invoke with: gh workflow run release.yml --ref <tag>
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Guard release version
        uses: kfet/gha/release-guard@afd38afe34a780de4e42d65ddffefdcac4b5e8e0

      - name: Build release artefacts
        run: make release-local VERSION="${GITHUB_REF_NAME#v}"
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

      # ---- Homebrew tap update --------------------------------------------
      # Renders Formula/harb.rb from packaging/homebrew/harb.rb.tmpl
      # using the just-built checksums, then commits + pushes it to
      # github.com/kfet/homebrew-tap. Requires a repo secret
      # HOMEBREW_TAP_TOKEN — a fine-grained PAT (or app token) with
      # `contents:write` on that tap repo.
      - name: Render Homebrew formula
        run: |
          mkdir -p tap/Formula
          scripts/render-formula.sh \
            "${GITHUB_REF_NAME#v}" \
            dist/checksums.txt \
            tap/Formula/harb.rb
          cat tap/Formula/harb.rb
      - name: Push to homebrew-tap tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set; skipping tap update"
            exit 0
          fi
          ver="${GITHUB_REF_NAME#v}"
          tmp=$(mktemp -d)
          git clone --depth 1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/kfet/homebrew-tap.git" \
            "$tmp/tap"
          mkdir -p "$tmp/tap/Formula"
          cp tap/Formula/harb.rb "$tmp/tap/Formula/harb.rb"
          cd "$tmp/tap"
          git config user.name  "harb-release[bot]"
          git config user.email "harb-release@users.noreply.github.com"
          git add Formula/harb.rb
          if git diff --cached --quiet; then
            echo "tap already up to date"
            exit 0
          fi
          git commit -m "harb ${ver}"
          git push origin HEAD
